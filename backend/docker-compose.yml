services:
  postgres:
    image: postgres:16

    container_name: ai-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_chat

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - '6379:6379'
    restart: always

volumes:
  postgres_data:
